name: vjepa21_temporal_detr_imagenet_vid
task: detection
media: video
references:
  backbone: [vjepa2_1]
  dense_features: [dinov3]
  detection: [detr, rf_detr]
  training_interface: [ultralytics]
model:
  num_classes: 31
  backbone:
    name: vit_base
    checkpoint: null
    tubelet_size: 1
detector:
  hidden_dim: 256
  num_queries: 100
data:
  name: imagenet_vid
  root: data/imagenet_vid
  image_size: 384
  num_frames: 8
  clip_stride: 4
  batch_size: 1
train:
  epochs: 1
