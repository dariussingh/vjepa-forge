task: classify
mode: train
media: image
model:
  name: vjepa21-b
  backbone:
    name: vit_base
    checkpoint: null
    checkpoint_key: ema_encoder
    use_sdpa: false
    modality_embedding: false
  head:
    name: classify
  num_classes: 2
data:
  path: data
  task: classify
  media: image
  image_size: 384
  image_backend: auto
  video_backend: auto
  past_frames: 8
  future_frames: 8
  stride: 1
train:
  epochs: 1
  batch_size: 2
  save: true
  save_period: 0
  resume: false
  project: outputs/vjepa-forge
  name: null
  exist_ok: false
  num_workers: 0
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
  reader_cache_size: 4
  device: cpu
  lr: 0.0001
  weight_decay: 0.0001
  lr_mode: manual
  reference_batch_size: 2
  reference_lr: 0.0001
  lr_scale_rule: sqrt
  seed: 7
val:
  batch_size: 2
  num_workers: 0
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
  reader_cache_size: 4
  split: val
  threshold_std_multiplier: 3.0
  smoothing_window: 9
  checkpoint_target: best
  checkpoint_path: null
predict:
  source: null
  batch_size: 1
  num_workers: 0
  split: test
  threshold: null
  visualize: false
  output_dir: null
export:
  format: onnx
  output_path: anomaly.onnx
  opset: 17
  dynamic_axes: true
  checkpoint_target: best
  checkpoint_path: null
output:
  root: outputs/vjepa-forge
distributed:
  backend: torchrun
  strategy: ddp
  precision: fp32
  sync_batchnorm: false
  compile: false
  compile_mode: reduce-overhead
  tf32: true
  channels_last: false
  ddp_eval: false
